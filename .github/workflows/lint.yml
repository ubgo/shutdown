name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  golangci-lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - .
          - contrib/shutdown-nethttp
          - contrib/shutdown-gin
          - contrib/shutdown-chi
          - contrib/shutdown-echo
          - contrib/shutdown-fiber
          - contrib/shutdown-zap
          - contrib/shutdown-otel
          - contrib/shutdown-prom
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.0
          args: --timeout=5m
          working-directory: ${{ matrix.module }}

  gofmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: assert gofmt clean
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt issues in:"
            echo "$out"
            exit 1
          fi
